services:
  - type: web
    name: github-portfolio-analyzer-backend
    env: python
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker app.main:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: TRUST_PROXY_HEADERS
        value: "true"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: GITHUB_TOKEN
        sync: false
